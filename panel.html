<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBIF 同步页</title>
    <link rel="stylesheet" href="styles/panel.css" />
  </head>
  <body class="popup-page">
    <main class="popup-card">
      <header class="popup-header">
        <div class="title-wrap">
          <img class="title-logo" src="icons/icon-32.png" alt="FBIF logo" />
          <h1 class="brand-title">FBIF飞书云文档文章同步助手</h1>
        </div>
        <button
          id="settingsToggle"
          class="icon-button"
          type="button"
          aria-expanded="false"
          aria-controls="settingsPanel"
          title="凭据设置"
        >
          <svg
            class="settings-icon"
            viewBox="0 0 1024 1024"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M656 576a144.064 144.064 0 0 1 140.448 112H864a32 32 0 0 1 3.744 63.776L864 752l-67.584 0.032a144.064 144.064 0 0 1-280.832 0L160 752a32 32 0 0 1-3.744-63.776L160 688h355.552A144.064 144.064 0 0 1 656 576z m0 64a80 80 0 1 0 0 160 80 80 0 0 0 0-160z m-288-480c69.12 0 126.816 48.64 140.8 113.6H864a32 32 0 0 1 3.744 63.776L864 337.6l-355.936 0.032a144.064 144.064 0 0 1-280.128 0L160 337.6a32 32 0 0 1-3.744-63.776L160 273.6h67.2A144.064 144.064 0 0 1 368 160z m0 64a80 80 0 1 0 0 160 80 80 0 0 0 0-160z"
              fill="currentColor"
            ></path>
          </svg>
        </button>
      </header>

      <label class="sr-only" for="urlInput">飞书文档链接</label>
      <input
        id="urlInput"
        class="field-input"
        type="url"
        placeholder="粘贴飞书文档链接（docx/wiki）"
        autocomplete="off"
      />
      <div class="helper-row">
        <p id="hintText" class="hint-text" data-tone="info">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="hintLead" class="hint-lead"></span>
          <span id="hintBody" class="hint-body">请先打开飞书文档</span>
        </p>
        <p class="guide-link-wrap">
          <a
            class="guide-link"
            href="https://foodtalks.feishu.cn/docx/Tt7idzYWWomWfzxcDN0cQN9onBb?from=from_copylink"
            target="_blank"
            rel="noopener noreferrer"
            ><span>使用教程</span>
            <svg
              class="guide-link-icon"
              viewBox="350 240 333 544"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M562.005333 512l-211.2-211.2 60.330667-60.288L682.666667 512l-271.530667 271.530667-60.330667-60.373334 211.2-211.2z"
                fill="currentColor"
              ></path>
            </svg></a
          >
        </p>
      </div>

      <section id="targetSection" class="target-section is-hidden" aria-label="同步目标">
        <label class="target-card" data-target="foodtalks">
          <input type="radio" name="syncTarget" value="foodtalks" />
          <span class="target-name">FoodTalks</span>
        </label>
        <label class="target-card" data-target="wechat">
          <input type="radio" name="syncTarget" value="wechat" />
          <span class="target-name">公众号</span>
        </label>
      </section>

      <div id="wechatStatusTag" class="sync-status-tag is-hidden" data-status="idle">
        <span id="wechatStatusText">公众号状态：待开始</span>
      </div>

      <button id="actionButton" class="btn btn-primary" type="button">提取飞书云文档内容</button>
      <div id="cacheInfoRow" class="cache-info-row is-hidden">
        <p id="cacheTimeText" class="cache-time-text"></p>
        <button id="reextractButton" class="btn-link" type="button">重新提取</button>
      </div>

      <section id="settingsPanel" class="settings-panel is-hidden" aria-label="凭据设置">
        <input id="feishuAppIdInput" class="field-input compact" type="text" placeholder="App ID" autocomplete="off" />
        <input
          id="feishuAppSecretInput"
          class="field-input compact"
          type="password"
          placeholder="App Secret"
          autocomplete="off"
        />
      </section>
    </main>

    <script type="module" src="src/panel.js"></script>
  </body>
</html>
